    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #e6e8ec;
            overflow: hidden; 
        }

        /* The Hover Trigger (The 3 Bars) */
        .menu-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 10px;
            cursor: pointer;
        }

        .hamburger {
            width: 30px;
            height: 4px;
            background-color: #c62828;
            margin: 6px 0;
            transition: 0.4s;
            border-radius: 2px;
        }

        /* Navigation Drawer */
        .nav-drawer {
            position: fixed;
            top: 0;
            left: -280px; 
            width: 260px;
            height: 100%;
            background-color: #f3f4f6;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s ease;
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }

        /* Show menu on hover */
        .menu-container:hover .nav-drawer {
            left: 0;
        }

        .nav-drawer a {
            padding: 18px 25px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
            border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .nav-drawer a:hover {
            background-color: #ffffff;
            color: #c62828;
            padding-left: 35px;
        }

        /* Omnivox Button Styling inside Menu */
        .omnivox-menu-btn {
            text-align: center;
            padding: 20px 0;
            border-bottom: none !important;
        }

        .omnivox-menu-btn img {
            width: 180px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .omnivox-menu-btn:hover img {
            transform: scale(1.05);
        }
		
		/* Content Area - Now takes full height since logo is inside it */
        .content-frame {
            width: 100%;
            height: 100vh;
            border: none;
            background: #e6e8ec;
        }
		
		/* Default Main Page Content */
        .home-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            background: #e6e8ec;
            text-align: center;
        }
		
		/* Schedule Table Styling */
        .schedule-container { max-width: 900px; margin: 20px auto; padding: 20px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .schedule-grid { display: grid; grid-template-columns: 80px repeat(5, 1fr); gap: 1px; background: #ddd; border: 1px solid #ddd; }
        .grid-header { background: #c62828; color: white; padding: 10px; font-weight: bold; font-size: 14px; }
        .time-col { background: #f9f9f9; font-size: 11px; padding: 10px 5px; font-weight: bold; border-bottom: 1px solid #eee; display: flex; align-items: center; justify-content: center; }
        .day-cell { background: white; min-height: 90px; padding: 8px; font-size: 12px; display: flex; flex-direction: column; justify-content: center; border: 1px solid #f0f0f0; }
        .course-box { padding: 6px; border-radius: 4px; line-height: 1.3; border-left: 3px solid #c62828; background: #fff5f5; text-align: left; }
        .time-label { display: block; font-weight: bold; color: #c62828; font-size: 10px; }
	</style>
</head>
