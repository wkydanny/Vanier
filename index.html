<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Portal - Vanier College</title>
    <link rel="icon" type="image/jpeg" href="icon_vanier.png">
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: "Segoe UI", Arial, sans-serif;
            background: #e6e8ec; overflow: hidden; 
        }
        .menu-container {
            position: fixed; top: 20px; left: 20px;
            z-index: 1000; padding: 10px; cursor: pointer;
        }
        .hamburger {
            width: 30px; height: 4px; background-color: #c62828;
            margin: 6px 0; transition: 0.4s; border-radius: 2px;
        }
        /* The menu is hidden by default at -280px */
        .nav-drawer {
            position: fixed; top: 0; left: -280px; 
            width: 260px; height: 100%;
            background-color: #f3f4f6; box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            transition: 0.3s ease; display: flex; flex-direction: column; padding-top: 80px;
        }
        /* This class triggers the sliding animation */
        .nav-drawer.open { left: 0; }

        .nav-drawer a {
            padding: 18px 25px; text-decoration: none;
            color: #333; font-weight: bold; border-bottom: 1px solid #e0e0e0;
            transition: all 0.2s;
        }
        .nav-drawer a:hover { background-color: #ffffff; color: #c62828; padding-left: 35px; }
        .omnivox-menu-btn { text-align: center; padding: 20px 0; border-bottom: none !important; }
        .omnivox-menu-btn img { width: 180px; border-radius: 6px; transition: transform 0.2s; }
        .omnivox-menu-btn:hover img { transform: scale(1.05); }
        .content-frame { width: 100%; height: 100vh; border: none; background: #e6e8ec; }
    </style>
</head>
<body>

    <div class="menu-container" onclick="toggleMenu(event)">
        <div class="hamburger"></div>
        <div class="hamburger"></div>
        <div class="hamburger"></div>
        <nav class="nav-drawer" id="navDrawer">
            <a href="index.html" onclick="toggleMenu()">Main Page</a>
            
            <a href="MathLogic.html" target="content-viewport" 
               onclick="toggleMenu(); updateFrame('MathLogic.html'); return true;">
               Math Logic (201-911-VA)
            </a>
            
            <a href="OpSys.html" target="content-viewport" 
               onclick="toggleMenu(); updateFrame('OpSys.html'); return true;">
               Operating Systems (420-911-VA)
            </a>
            
            <a href="Programming1.html" target="content-viewport" 
               onclick="toggleMenu(); updateFrame('Programming1.html'); return true;">
               Programming 1 (420-910-VA)
            </a>
            
            <a href="https://vaniercollege.omnivox.ca/" target="_blank" class="omnivox-menu-btn" onclick="toggleMenu()">
                <img src="logo_omnivox.jpg" alt="Omnivox">
            </a>
            
            <a href="https://ticfp.qc.ca/" target="_blank" class="omnivox-menu-btn" onclick="toggleMenu()">
                <img src="logo-ticfp.png" alt="TicFP">
            </a>
        </nav>
    </div>

    <iframe name="content-viewport" id="mainFrame" class="content-frame" srcdoc="...">
        </iframe>

    <script>
        function toggleMenu(e) {
            const nav = document.getElementById('navDrawer');
            // If the event exists and we clicked the hamburger/container, toggle it
            if (e && e.currentTarget.classList.contains('menu-container')) {
                nav.classList.toggle('open');
                if (e) e.stopPropagation(); // Stop click from immediately closing
            } else {
                // If a link was clicked, just close it
                nav.classList.remove('open');
            }
        }

        function updateFrame(url) {
            const frame = document.getElementsByName('content-viewport')[0];
            frame.src = url + '?t=' + new Date().getTime();
        }

        // Close menu if user clicks anywhere on the background/iframe
        window.onclick = function(event) {
            if (!event.target.closest('.menu-container')) {
                document.getElementById('navDrawer').classList.remove('open');
            }
        }
    </script>
</body>
</html>
