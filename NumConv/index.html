<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number System Mastery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">

        <header>
            <div class="stats-container">
                <div class="score-board">
                    <span>Active Stack: 3</span>
                    <span>Score: <span id="score-percentage">0%</span> (<span id="score-ratio">0/0</span>)</span>
                </div>
                <div id="history-log" class="history-log">
                    <div class="history-placeholder">Start solving to see history...</div>
                </div>
            </div>
        </header>

        <main id="game-board">
            <!-- Cards will be injected here via JS -->
        </main>

        <!-- Explanation Modal -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal">
                <div class="modal-header">
                    <h2>Solution Steps</h2>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div id="modal-content" class="modal-content">
                    <!-- Content injected via JS -->
                </div>
            </div>
        </div>

        <footer>
            <!-- Footer content if any -->
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
